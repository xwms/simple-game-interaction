name: CI

on:
  push:
    branches: [main]
    tags: ['v*']
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
      fail-fast: false
    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-node@v5
        with:
          node-version: 22
          cache: npm

      - run: npm ci

      - run: npm run build

      - run: npm test
        env:
          CI: true

  build:
    if: startsWith(github.ref, 'refs/tags/v')
    needs: [test]
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            script: dist:linux
            artifact: SGI-*-linux.*
          - os: macos-latest
            script: dist:mac
            artifact: SGI-*-mac-*.*
          - os: windows-latest
            script: dist:win
            artifact: SGI-Setup-*-win.exe
    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-node@v5
        with:
          node-version: 22
          cache: npm

      - run: npm ci

      - run: npm run build

      - name: Install Linux build dependencies
        if: matrix.os == 'ubuntu-latest'
        run: |
          sudo apt-get update
          sudo apt-get install -y dpkg-dev fakeroot rpm squashfs-tools libarchive-tools

      - name: Cleanup stray DMG mounts (macOS)
        if: startsWith(matrix.os, 'macos-')
        continue-on-error: true
        run: hdiutil info | grep "/dev/disk" | grep -v "internally" | awk '{print $1}' | xargs -I{} hdiutil detach {} -quiet 2>/dev/null || true

      - name: Build package (${{ matrix.os }})
        run: npm run ${{ matrix.script }} -- --publish=never

      - uses: actions/upload-artifact@v4.6.2
        with:
          name: package-${{ matrix.os }}
          path: release/${{ matrix.artifact }}

  create-release:
    if: startsWith(github.ref, 'refs/tags/v')
    needs: [test, build]
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v5

      - uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Generate release notes
        run: |
          echo "# 更新日志" > release-body.md
          echo "" >> release-body.md
          sed -n '/^## /,/^## /p' CHANGELOG.md | head -n -2 >> release-body.md

      - uses: softprops/action-gh-release@v2
        with:
          body_path: release-body.md
          files: artifacts/package-*/*

      - name: Sync release to Gitee
        env:
          GITEE_TOKEN: ${{ secrets.GITEE_TOKEN }}
        run: |
          if [ -z "$GITEE_TOKEN" ]; then
            echo "GITEE_TOKEN not configured, skipping Gitee sync"
            exit 0
          fi

          set -e
          TAG="${GITHUB_REF_NAME}"
          echo "Syncing ${TAG} to Gitee..."

          # 创建/更新 Gitee Release
          RELEASE_BODY=$(cat release-body.md | jq -Rs .)
          RESP=$(curl -s -X POST "https://gitee.com/api/v5/repos/xwms/simple-game-interaction/releases" \
            -H "Content-Type: application/json" \
            -d "{\"access_token\":\"${GITEE_TOKEN}\",\"tag_name\":\"${TAG}\",\"name\":\"${TAG}\",\"body\":${RELEASE_BODY},\"prerelease\":false}")
          RELEASE_ID=$(echo "$RESP" | jq -r '.id // empty')

          if [ -z "$RELEASE_ID" ]; then
            echo "Gitee release create response: $RESP"
            # 可能已存在，尝试获取现有 release_id
            RELEASE_ID=$(curl -s "https://gitee.com/api/v5/repos/xwms/simple-game-interaction/releases/tags/${TAG}?access_token=${GITEE_TOKEN}" | jq -r '.id // empty')
          fi

          if [ -z "$RELEASE_ID" ]; then
            echo "Failed to create/get Gitee release — skipping asset upload"
            exit 0
          fi

          echo "Gitee release ID: ${RELEASE_ID}"

          # 上传各个安装包
          for file in artifacts/package-*/*; do
            [ -f "$file" ] || continue
            echo "Uploading $(basename "$file")..."
            curl -s -X POST "https://gitee.com/api/v5/repos/xwms/simple-game-interaction/releases/${RELEASE_ID}/attach_files" \
              -F "access_token=${GITEE_TOKEN}" \
              -F "file=@${file}" > /dev/null
          done
          echo "Gitee sync complete"
