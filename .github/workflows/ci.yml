name: CI

on:
  push:
    branches: [main]
    tags: ['v*']
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
      fail-fast: false
    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-node@v5
        with:
          node-version: 22
          cache: npm

      - run: npm ci

      - run: npm run build

      - run: npm test
        env:
          CI: true

  build:
    if: startsWith(github.ref, 'refs/tags/v')
    needs: [test]
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            script: dist:linux
            artifact: SGI-*-linux.*
          - os: macos-latest
            script: dist:mac
            artifact: SGI-*-mac-*.*
          - os: windows-latest
            script: dist:win
            artifact: SGI-Setup-*-win.exe
    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-node@v5
        with:
          node-version: 22
          cache: npm

      - run: npm ci

      - run: npm run build

      - name: Install Linux build dependencies
        if: matrix.os == 'ubuntu-latest'
        run: |
          sudo apt-get update
          sudo apt-get install -y dpkg-dev fakeroot rpm squashfs-tools libarchive-tools

      - name: Cleanup stray DMG mounts (macOS)
        if: startsWith(matrix.os, 'macos-')
        continue-on-error: true
        run: hdiutil info | grep "/dev/disk" | grep -v "internally" | awk '{print $1}' | xargs -I{} hdiutil detach {} -quiet 2>/dev/null || true

      - name: Build package (${{ matrix.os }})
        run: npm run ${{ matrix.script }} -- --publish=never

      - uses: actions/upload-artifact@v4.6.2
        with:
          name: package-${{ matrix.os }}
          path: release/${{ matrix.artifact }}

  create-release:
    if: startsWith(github.ref, 'refs/tags/v')
    needs: [test, build]
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v5

      - uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Generate release notes
        run: |
          awk '/^---$/{exit}1' CHANGELOG.md > release-body.md

      - uses: softprops/action-gh-release@v2
        with:
          body_path: release-body.md
          files: artifacts/package-*/*
          make_latest: "true"

  sync-gitee:
    if: startsWith(github.ref, 'refs/tags/v')
    needs: [create-release]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - name: Sync to Gitee release
        env:
          GITEE_TOKEN: ${{ secrets.GITEE_TOKEN }}
          TAG: ${{ github.ref_name }}
        run: |
          echo "Syncing ${TAG} to Gitee..."

          # 1. 查找 Windows 安装包
          WIN_ASSET=$(gh release view "${TAG}" --json assets \
            -q '.assets[] | select(.name | endswith(".exe") and contains("Setup") and (contains("blockmap") | not)) | .name' | head -1)
          if [ -z "${WIN_ASSET}" ]; then echo "No Windows installer, skipping"; exit 0; fi
          echo "Asset: ${WIN_ASSET}"

          # 2. 下载安装包
          gh release download "${TAG}" --pattern "${WIN_ASSET}" --output "/tmp/${WIN_ASSET}" --clobber

          # 3. 获取 release body（截断到 5000 字符）
          BODY=$(gh release view "${TAG}" --json body -q '.body' | head -c 5000)
          export BODY

          # 4. 查询 Gitee 已有 release
          EXISTING_ID=$(curl -s "https://gitee.com/api/v5/repos/xwms/simple-game-interaction/releases?access_token=${GITEE_TOKEN}&per_page=100" \
            | node -e "
              const d=[]; process.stdin.on('data',c=>d.push(c));
              process.stdin.on('end',()=>{
                const r=JSON.parse(d.join(''));
                const m=r.find(x=>x.tag_name===process.env.TAG);
                console.log(m?m.id:'')
              })
            ")

          # 5. 创建或更新 release
          CREATE_BODY=$(node -e "
            const tag = process.env.TAG;
            console.log(JSON.stringify({
              tag_name: tag,
              name: tag,
              body: (process.env.BODY || '').slice(0, 5000),
              prerelease: tag.includes('-'),
              target_commitish: 'main'
            }))
          ")

          if [ -n "${EXISTING_ID}" ]; then
            echo "Updating Gitee release (id=${EXISTING_ID})"
            curl -s -X PATCH "https://gitee.com/api/v5/repos/xwms/simple-game-interaction/releases/${EXISTING_ID}?access_token=${GITEE_TOKEN}" \
              -H "Content-Type: application/json" -d "${CREATE_BODY}" > /dev/null
          else
            echo "Creating Gitee release..."
            EXISTING_ID=$(curl -s -X POST "https://gitee.com/api/v5/repos/xwms/simple-game-interaction/releases?access_token=${GITEE_TOKEN}" \
              -H "Content-Type: application/json" -d "${CREATE_BODY}" \
              | node -e "process.stdin.on('data',d=>console.log(JSON.parse(d).id||''))")
            echo "Created id=${EXISTING_ID}"
          fi

          # 6. 上传安装包
          if [ -n "${EXISTING_ID}" ] && [ "${EXISTING_ID}" != "null" ] && [ "${EXISTING_ID}" != "0" ]; then
            echo "Uploading ${WIN_ASSET}..."
            curl -s -X POST "https://gitee.com/api/v5/repos/xwms/simple-game-interaction/releases/${EXISTING_ID}/attach_files?access_token=${GITEE_TOKEN}" \
              -F "file=@/tmp/${WIN_ASSET}" > /dev/null
            echo "Upload complete"
          fi

          rm -f "/tmp/${WIN_ASSET}"
          echo "Gitee sync done"
