name: CI

on:
  push:
    branches: [main]
    tags: ['v*']
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
      fail-fast: false
    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-node@v5
        with:
          node-version: 22
          cache: npm

      - run: npm ci

      - run: npm run build

      - run: npm test
        env:
          CI: true

  build:
    if: startsWith(github.ref, 'refs/tags/v')
    needs: [test]
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            script: dist:linux
            artifact: SGI-*-linux.*
          - os: macos-latest
            script: dist:mac
            artifact: SGI-*-mac-*.*
          - os: windows-latest
            script: dist:win
            artifact: SGI-Setup-*-win.exe
    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-node@v5
        with:
          node-version: 22
          cache: npm

      - run: npm ci

      - run: npm run build

      - name: Install Linux build dependencies
        if: matrix.os == 'ubuntu-latest'
        run: |
          sudo apt-get update
          sudo apt-get install -y dpkg-dev fakeroot rpm squashfs-tools libarchive-tools

      - name: Cleanup stray DMG mounts (macOS)
        if: startsWith(matrix.os, 'macos-')
        continue-on-error: true
        run: hdiutil info | grep "/dev/disk" | grep -v "internally" | awk '{print $1}' | xargs -I{} hdiutil detach {} -quiet 2>/dev/null || true

      - name: Build package (${{ matrix.os }})
        run: npm run ${{ matrix.script }} -- --publish=never

      - name: List release artifacts
        run: ls -la release/

      - uses: actions/upload-artifact@v4.6.2
        with:
          name: package-${{ matrix.os }}
          path: release/${{ matrix.artifact }}

  create-release:
    if: startsWith(github.ref, 'refs/tags/v')
    needs: [test, build]
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v5

      - uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: List artifacts
        run: find artifacts -type f -ls

      - name: Generate release notes
        run: |
          echo "# 更新日志" > release-body.md
          echo "" >> release-body.md
          sed -n '/^## /,/^## /p' CHANGELOG.md | head -n -2 >> release-body.md

      - uses: softprops/action-gh-release@v2
        with:
          body_path: release-body.md
          files: artifacts/package-*/*
