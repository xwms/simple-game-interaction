<!--
  功能描述：自定义托盘菜单弹出窗口
  逻辑说明：由 tray.js 创建 BrowserWindow 加载本页面。
           preload 脚本（tray-menu-preload.js）负责注册点击事件和注入 iconfont。
           支持 light/dark 主题，通过 body.light 切换。
-->
<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link rel="stylesheet" href="iconfont/iconfont.css">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "PingFang SC", "Microsoft YaHei", sans-serif;
    font-size: 13px;
    border-radius: 10px;
    overflow: hidden;
    user-select: none;
    -webkit-user-select: none;
  }

  /* ── Dark (default) ── */
  body {
    color: #e0e0e0;
    background: #2a2a2a;
  }
  .menu-item:hover { background: #3a3a3a; }
  .menu-item:active { background: #454545; }
  .divider { background: #3a3a3a; }

  /* ── Light ── */
  body.light {
    color: #333;
    background: #ffffff;
  }
  body.light .menu-item:hover { background: #f0f0f0; }
  body.light .menu-item:active { background: #e5e5e5; }
  body.light .divider { background: #e5e5e5; }

  .menu { padding: 4px; }

  .menu-item {
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 8px 14px;
    border-radius: 6px;
    cursor: pointer;
    transition: background 0.12s ease;
  }

  .menu-item .iconfont {
    font-size: 16px;
    flex-shrink: 0;
  }
  #action-show .iconfont { color: #22c55e; }
  #action-quit .iconfont { color: #ef4444; -webkit-text-stroke: 1px #ef4444; }
  #action-disconnect .iconfont { color: #f59e0b; font-size: 19px; -webkit-text-stroke: 0.5px #f59e0b; }

  .menu-item .label { flex: 1; line-height: 1.3; }

  .divider {
    height: 1px;
    margin: 4px 8px;
  }
</style>
</head>
<body>
  <div class="menu">
    <div class="menu-item" id="action-show">
      <span class="iconfont icon-zuidahua"></span>
      <span class="label">显示窗口</span>
    </div>
    <div class="divider"></div>
    <div class="menu-item" id="action-disconnect">
      <span class="iconfont icon-yizhongduan"></span>
      <span class="label">断开连接</span>
    </div>
    <div class="divider"></div>
    <div class="menu-item" id="action-quit">
      <span class="iconfont icon-tuichu"></span>
      <span class="label">退出</span>
    </div>
  </div>
</body>
</html>
