<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#667eea"/>
      <stop offset="100%" stop-color="#764ba2"/>
    </linearGradient>
  </defs>
  <!-- 圆角背景 -->
  <rect width="512" height="512" rx="96" fill="url(#bg)"/>
  <!-- 游戏手柄图标 -->
  <g transform="translate(256,256)" fill="none" stroke="#fff" stroke-width="24" stroke-linecap="round" stroke-linejoin="round">
    <!-- 手柄主体 -->
    <rect x="-120" y="-60" width="240" height="120" rx="30"/>
    <!-- 左摇杆 -->
    <circle cx="-60" cy="-20" r="20" fill="#fff" stroke="none"/>
    <!-- 右摇杆 -->
    <circle cx="60" cy="-20" r="20" fill="#fff" stroke="none"/>
    <!-- 方向键 -->
    <line x1="-50" y1="30" x2="-30" y2="30"/>
    <line x1="-40" y1="20" x2="-40" y2="40"/>
    <!-- AB 按钮 -->
    <circle cx="50" cy="30" r="10"/>
    <circle cx="70" cy="30" r="10"/>
    <!-- 连接弧线 -->
    <path d="M-60,60 Q0,90 60,60" stroke-width="16"/>
  </g>
</svg>
